spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/team_dashboard}
    username: ${DB_USERNAME:dashboard_user}
    password: ${DB_PASSWORD:dashboard_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jira:
  base-url: ${JIRA_BASE_URL}
  api-token: ${JIRA_API_TOKEN}
  user-email: ${JIRA_USER_EMAIL}

workload:
  cache:
    ttl-minutes: 5

server:
  port: 8080
